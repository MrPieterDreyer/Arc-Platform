# Depends on ProductListFields fragment from products.graphql — both must be loaded together for codegen.

query SearchProducts($search: String!, $first: Int = 24, $after: String) {
  products(first: $first, after: $after, where: { search: $search, status: "publish" }) {
    pageInfo {
      hasNextPage
      endCursor
    }
    nodes {
      ... on SimpleProduct {
        ...ProductListFields
      }
      ... on VariableProduct {
        databaseId
        slug
        name
        price
        featuredImage {
          node {
            sourceUrl
            altText
          }
        }
      }
    }
  }
}
