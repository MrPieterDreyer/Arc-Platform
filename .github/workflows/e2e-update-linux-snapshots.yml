# Generate Linux visual baselines (Wave 9)
#
# Manual only â€” does NOT block PR merge. Run after intentional design changes or
# when bootstrapping `e2e/snapshots/linux/` for CI (ubuntu-latest).
#
# After the job completes: download the `linux-visual-snapshots` artifact and
# commit PNGs under Arc/Pilot/e2e/snapshots/linux/
name: E2E Update Linux Snapshots

on:
  workflow_dispatch:

concurrency:
  group: e2e-update-linux-snapshots
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  update-linux-snapshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Boot wp-env and seed fixtures
        run: pnpm wp:setup
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
        working-directory: Arc/Pilot
      - name: Build minimal-app
        run: pnpm --filter @arc-platform/pilot build
      - name: Update visual baselines (@visual, linux platform)
        run: pnpm --filter @arc-platform/pilot test:e2e:update-snapshots
      - name: Upload linux snapshot PNGs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-visual-snapshots
          path: Arc/Pilot/e2e/snapshots/linux/
          if-no-files-found: error
      - name: Job summary
        run: |
          echo "## Linux visual baselines generated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the **linux-visual-snapshots** artifact and commit PNGs to:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`Arc/Pilot/e2e/snapshots/linux/\`" >> "$GITHUB_STEP_SUMMARY"
      - name: Tear down wp-env
        if: always()
        run: pnpm wp:stop
