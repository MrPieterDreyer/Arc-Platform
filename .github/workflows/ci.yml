# Source: pnpm/action-setup README + Vercel/Turborepo CI guide
# Pattern 7 from .planning/phases/00-tooling-foundations/00-RESEARCH.md
name: CI
on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  no-next-in-core:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: bash Scripts/check-no-next-in-core.sh

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    needs: install
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 20 dropped: pnpm@11 requires Node >=22.13 (engines.node).
        node: [22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  # Live-backend contract + perf suites. Without this job the skipIf(!CI_WP_ENV)
  # tests never run and report green-by-skip. Boots WP+WC+WPGraphQL via wp-env
  # (Docker, preinstalled on ubuntu-latest), seeds fixtures, then runs the gated
  # tests with CI_WP_ENV set so they actually execute.
  contract:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first so @arc-platform/next contract tests resolve @arc-platform/core from dist.
      - run: pnpm build
      - name: Boot wp-env (WP + WC + WPGraphQL + WooGraphQL)
        run: pnpm wp:start
      - name: Seed WooCommerce fixtures (writes .env.wp-test with CI_WP_ENV=true)
        run: pnpm wp:seed
      - name: Run contract + perf suites against the live backend
        run: pnpm test:contract
      # Wave-2 codegen gate: introspects the live WPGraphQL schema and validates
      # every .graphql document against it - fails on schema/query drift. Output
      # is gitignored; success of the generation IS the gate.
      - name: GraphQL codegen against live schema (drift gate)
        run: pnpm --filter @arc-platform/core codegen
        env:
          WP_GRAPHQL_ENDPOINT: http://localhost:8888/graphql
      - name: Tear down wp-env
        if: always()
        run: pnpm wp:stop

  e2e-smoke:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Boot wp-env and seed fixtures
        run: pnpm wp:setup
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
        working-directory: Arc/Pilot
      - name: Build minimal-app
        run: pnpm --filter @arc-platform/pilot build
      - name: E2E smoke (@smoke)
        run: pnpm test:e2e:smoke
      - name: E2E integration (@integration)
        run: pnpm test:e2e:integration
      - name: Upload agent report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-agent-report
          path: Artifacts/e2e-reports/latest.json
          if-no-files-found: ignore
      - name: Tear down wp-env
        if: always()
        run: pnpm wp:stop

  license-check:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm license-check

  changesets-no-major:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 22 }
      - run: node Scripts/verify-changesets-no-major.mjs

  verify-governance:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify-adrs
      - run: pnpm build
      - run: pnpm verify-dist

  # ---------------------------------------------------------------------------
  # Weave WordPress plugin (PHP) â€” extends this workflow per D-15 (do NOT fork).
  # These jobs have no pnpm dependency, so they intentionally omit `needs: install`.
  # ---------------------------------------------------------------------------

  # PHPCS is version-invariant: lint results do not change across PHP/WP/WC.
  # Run it ONCE in a single cell rather than 16x inside the wp-plugin matrix.
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none
      - name: Install plugin dev deps
        run: composer install --no-interaction --prefer-dist
        working-directory: Weave/WordPress
      - name: PHPCS
        run: composer lint
        working-directory: Weave/WordPress

  # WEAVE-WP-09 gate: run the plugin PHPUnit suite across the supported
  # PHP x WP x WC compatibility surface. Built on shivammathur/setup-php +
  # a MySQL service + install-wp-tests.sh â€” NOT wp-env per cell (RESEARCH Pitfall 4:
  # wp-env's bundled PHPUnit is fragile across a PHP-version matrix).
  wp-plugin:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # full compatibility picture, not first-failure
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        wp: ['latest', '6.9'] # latest (resolved at run time) + one previous major
        wc: ['latest', '10.7.1'] # latest (resolved at run time) + WC-1 (pinned)
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          extensions: mysqli, mbstring
          coverage: none
      - name: Install plugin dev deps
        run: composer install --no-interaction --prefer-dist
        working-directory: Weave/WordPress
      - name: Install WP test suite (version-matched)
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wp }}
        working-directory: Weave/WordPress
      - name: Install WooCommerce ${{ matrix.wc }}
        run: bash bin/install-woocommerce.sh ${{ matrix.wc }}
        working-directory: Weave/WordPress
      - name: PHPUnit
        run: composer test
        working-directory: Weave/WordPress
