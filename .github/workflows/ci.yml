# Source: pnpm/action-setup README + Vercel/Turborepo CI guide
# Pattern 7 from .planning/phases/00-tooling-foundations/00-RESEARCH.md
name: CI
on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  no-next-in-core:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash Scripts/check-no-next-in-core.sh

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    needs: install
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 20 dropped: pnpm@11 requires Node >=22.13 (engines.node).
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  # Live-backend contract + perf suites. Without this job the skipIf(!CI_WP_ENV)
  # tests never run and report green-by-skip. Boots WP+WC+WPGraphQL via wp-env
  # (Docker, preinstalled on ubuntu-latest), seeds fixtures, then runs the gated
  # tests with CI_WP_ENV set so they actually execute.
  contract:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first so @arc/next contract tests resolve @arc/core from dist.
      - run: pnpm build
      - name: Boot wp-env (WP + WC + WPGraphQL + WooGraphQL)
        run: pnpm wp:start
      - name: Seed WooCommerce fixtures (writes .env.wp-test with CI_WP_ENV=true)
        run: pnpm wp:seed
      - name: Run contract + perf suites against the live backend
        run: pnpm test:contract
      - name: Tear down wp-env
        if: always()
        run: pnpm wp:stop

  license-check:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm license-check

  changesets-no-major:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: node Scripts/verify-changesets-no-major.mjs
