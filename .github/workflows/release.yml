# Changesets-driven publish workflow
# Source: .planning/phases/00-tooling-foundations/00-RESEARCH.md (Pattern 7)
# NPM_TOKEN must be set as a GitHub repository secret (never committed â€” CLAUDE.md constraint).
#
# Release tags: merging the "Version Packages" PR runs changesets/action, which publishes
# to npm and creates GitHub releases via @changesets/changelog-github (see .changeset/config.json).
name: Release
on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  id-token: write   # for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Guard â€” refuse accidental major/v1 publish
        run: node Scripts/verify-changesets-no-major.mjs
        env:
          ARC_ALLOW_V1_PUBLISH: ${{ secrets.ARC_ALLOW_V1_PUBLISH }}
      # NPM_CONFIG_PROVENANCE makes the underlying npm publish emit a Sigstore
      # attestation linking the tarball to this workflow run (requires the
      # id-token: write permission above). `changeset publish` has no
      # --provenance flag — provenance must come in via npm config. ADR-0012 P1.
      # TODO(ADR-0012): once @arc/* and @weave/* are registered for npm OIDC Trusted
      # Publishing on npmjs.com, set `NPM_TOKEN: ''` and drop the repository secret —
      # the OIDC exchange replaces the static token entirely.
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
