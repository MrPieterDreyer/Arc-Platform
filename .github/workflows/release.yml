# Changesets-driven publish workflow
# Source: .planning/phases/00-tooling-foundations/00-RESEARCH.md (Pattern 7)
# NPM_TOKEN must be set as a GitHub repository secret (never committed — CLAUDE.md constraint).
#
# Release tags: merging the "Version Packages" PR runs changesets/action, which publishes
# to npm and creates GitHub releases via @changesets/changelog-github (see .changeset/config.json).
name: Release
on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  id-token: write   # for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Guard — refuse accidental major/v1 publish
        run: node Scripts/verify-changesets-no-major.mjs
        env:
          ARC_ALLOW_V1_PUBLISH: ${{ secrets.ARC_ALLOW_V1_PUBLISH }}
      - uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
