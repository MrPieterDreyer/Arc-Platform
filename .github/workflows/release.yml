# Changesets-driven publish workflow
# Source: .planning/phases/00-tooling-foundations/00-RESEARCH.md (Pattern 7)
#
# Auth: npm OIDC Trusted Publishing (ADR-0012) — no NPM_TOKEN secret. All four
# packages are registered on npmjs.com with this repo + workflow filename as
# their trusted publisher; pnpm exchanges the Actions id-token for a short-lived
# publish token at publish time, and npm attaches Sigstore provenance
# attestations automatically as part of that exchange.
#
# Release tags: merging the "Version Packages" PR runs changesets/action, which publishes
# to npm and creates GitHub releases via @changesets/changelog-github (see .changeset/config.json).
name: Release
on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  id-token: write   # OIDC trusted publishing + provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      # No registry-url: that option writes an NPM_CONFIG_USERCONFIG npmrc
      # authenticating via ${NODE_AUTH_TOKEN} — undefined in the tokenless
      # OIDC setup, which turns a failed/raced token exchange into a silent
      # E404. pnpm defaults to registry.npmjs.org without it.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Guard â€” refuse accidental major/v1 publish
        run: node Scripts/verify-changesets-no-major.mjs
        env:
          ARC_ALLOW_V1_PUBLISH: ${{ secrets.ARC_ALLOW_V1_PUBLISH }}
      # NPM_TOKEN is the empty string ON PURPOSE (changesets/action#1152 OIDC
      # workaround): the action requires the variable to exist to skip its
      # token preflight, while pnpm's OIDC exchange supplies the real
      # short-lived publish token. Do NOT reintroduce a static token here —
      # trusted publishing replaces it and yields provenance automatically.
      # Provenance flag plumbing (env vars / publishConfig / .npmrc) does NOT
      # reach pnpm through changesets — releases 0.1.0–0.1.2 proved all three
      # mechanisms ship unattested artifacts.
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ''
