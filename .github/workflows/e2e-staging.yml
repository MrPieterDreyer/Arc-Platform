# Staging E2E — payment sandbox and full journeys (manual only; does not block PRs).
# Configure repository secrets: E2E_STAGING_STOREFRONT_URL, E2E_STAGING_WP_URL, E2E_STRIPE_*.
name: E2E Staging

on:
  workflow_dispatch:

concurrency:
  group: e2e-staging
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  CI: true
  E2E_ENV: staging

jobs:
  e2e-staging:
    if: ${{ secrets.E2E_STAGING_STOREFRONT_URL != '' && secrets.E2E_STAGING_WP_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
        working-directory: Arc/Next/examples/minimal-app
      - name: Build minimal-app
        run: pnpm --filter @arc/next-example build
      - name: Checkout regression (requires live staging URLs in secrets)
        run: pnpm test:e2e:checkout
        env:
          E2E_STOREFRONT_URL: ${{ secrets.E2E_STAGING_STOREFRONT_URL }}
          E2E_WP_URL: ${{ secrets.E2E_STAGING_WP_URL }}
          ARC_WC_URL: ${{ secrets.E2E_STAGING_WP_URL }}
          E2E_STRIPE_PUBLISHABLE_KEY: ${{ secrets.E2E_STRIPE_PUBLISHABLE_KEY }}
          E2E_STRIPE_SECRET_KEY: ${{ secrets.E2E_STRIPE_SECRET_KEY }}
      - name: Payment sandbox (@payment — skipped when Stripe secrets unset)
        run: pnpm test:e2e:payment
        env:
          E2E_STOREFRONT_URL: ${{ secrets.E2E_STAGING_STOREFRONT_URL }}
          E2E_WP_URL: ${{ secrets.E2E_STAGING_WP_URL }}
          ARC_WC_URL: ${{ secrets.E2E_STAGING_WP_URL }}
          E2E_STRIPE_PUBLISHABLE_KEY: ${{ secrets.E2E_STRIPE_PUBLISHABLE_KEY }}
          E2E_STRIPE_SECRET_KEY: ${{ secrets.E2E_STRIPE_SECRET_KEY }}
