# Staging E2E â€” payment sandbox and full journeys (manual only; does not block PRs).
# Configure repository secrets: E2E_STAGING_STOREFRONT_URL, E2E_STAGING_WP_URL, E2E_STRIPE_*.
name: E2E Staging

on:
  workflow_dispatch:

concurrency:
  group: e2e-staging
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  CI: true
  E2E_ENV: staging

jobs:
  e2e-staging:
    runs-on: ubuntu-latest
    steps:
      # secrets context is not available in job-level `if` — using it there
      # invalidates the whole workflow file (startup_failure on every push).
      # Gate inside a step instead; the workflow is workflow_dispatch-only.
      - name: Require staging secrets
        env:
          STAGING_STOREFRONT_URL: ${{ secrets.E2E_STAGING_STOREFRONT_URL }}
          STAGING_WP_URL: ${{ secrets.E2E_STAGING_WP_URL }}
        run: |
          if [ -z "$STAGING_STOREFRONT_URL" ] || [ -z "$STAGING_WP_URL" ]; then
            echo "::error::E2E_STAGING_STOREFRONT_URL and E2E_STAGING_WP_URL repository secrets must be configured before dispatching this workflow."
            exit 1
          fi
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
        working-directory: Arc/Next/examples/minimal-app
      - name: Build minimal-app
        run: pnpm --filter @arc-platform/next-example build
      - name: Checkout regression (requires live staging URLs in secrets)
        run: pnpm test:e2e:checkout
        env:
          E2E_STOREFRONT_URL: ${{ secrets.E2E_STAGING_STOREFRONT_URL }}
          E2E_WP_URL: ${{ secrets.E2E_STAGING_WP_URL }}
          ARC_WC_URL: ${{ secrets.E2E_STAGING_WP_URL }}
          E2E_STRIPE_PUBLISHABLE_KEY: ${{ secrets.E2E_STRIPE_PUBLISHABLE_KEY }}
          E2E_STRIPE_SECRET_KEY: ${{ secrets.E2E_STRIPE_SECRET_KEY }}
      - name: Payment sandbox (@payment â€” skipped when Stripe secrets unset)
        run: pnpm test:e2e:payment
        env:
          E2E_STOREFRONT_URL: ${{ secrets.E2E_STAGING_STOREFRONT_URL }}
          E2E_WP_URL: ${{ secrets.E2E_STAGING_WP_URL }}
          ARC_WC_URL: ${{ secrets.E2E_STAGING_WP_URL }}
          E2E_STRIPE_PUBLISHABLE_KEY: ${{ secrets.E2E_STRIPE_PUBLISHABLE_KEY }}
          E2E_STRIPE_SECRET_KEY: ${{ secrets.E2E_STRIPE_SECRET_KEY }}
