# Visual regression â€” Playwright snapshots on minimal-app key routes.
# Blocks merge when snapshots differ (intentional design changes: update baselines in PR).
name: E2E Visual

on:
  pull_request:
    paths:
      - 'Design-Systems/**'
      - '**/e2e/**'
      - 'Arc/Next/examples/minimal-app/**'
      - 'Scripts/e2e-shared/**'
      - '.github/workflows/e2e-visual.yml'
  workflow_dispatch:

concurrency:
  group: e2e-visual-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  e2e-visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Boot wp-env and seed fixtures
        run: pnpm wp:setup
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
        working-directory: Arc/Pilot
      - name: Build minimal-app
        run: pnpm --filter @arc-platform/pilot build
      - name: Visual regression (@visual)
        run: pnpm test:e2e:visual
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-visual-playwright-report
          path: Artifacts/e2e-reports/playwright-report
          if-no-files-found: ignore
      # On a missing baseline Playwright writes the freshly-rendered PNG to the
      # snapshot path before failing. Upload it so Linux baselines can be
      # bootstrapped from the exact CI environment (download + commit to the PR).
      - name: Upload generated Linux baselines
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-visual-snapshots
          path: Arc/Pilot/e2e/snapshots/linux/
          if-no-files-found: ignore
      - name: Tear down wp-env
        if: always()
        run: pnpm wp:stop
