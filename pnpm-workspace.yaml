# Source: https://pnpm.io/catalogs
packages:
  - 'Arc/**'
  - 'Weave/**'
  - 'Templates/**'

allowBuilds:
  '@parcel/watcher': true
  core-js: true
  core-js-pure: true
  esbuild: true
  fs-ext-extra-prebuilt: true
  sharp: true
  unrs-resolver: true

catalog:
  react: ^19.2.0
  react-dom: ^19.2.0
  next: ^16.2.0
  typescript: 5.9.3
  '@types/node': ^25.9.1
  graphql: ^16.14.0
  graphql-request: ^7.4.0
  zod: ^4.4.3
  '@graphql-codegen/cli': ^6.0.0
  '@graphql-codegen/client-preset': ^4.5.1

minimumReleaseAgeExclude:
  - '@tanstack/query-core@5.101.0'
  - '@tanstack/react-query@5.101.0'
